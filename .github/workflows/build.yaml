name: Build Docker Image
on: push
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image with caching
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          pull: true
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/github-runner:latest
            ghcr.io/${{ github.repository_owner }}/github-runner:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
